  <script>
    (function () {
      try {
        var el = document.getElementById('webapp-schema');
        if (!el || !location.origin) {
          return;
        }
        var data = JSON.parse(el.textContent);
        data.url = location.origin + '/editor';
        el.textContent = JSON.stringify(data);
      } catch (e) {
        /* ignore */
      }
    })();
  </script>

<body>
  <script>
    (function () {
      try {
        var preference = 'light';
        var configRaw = localStorage.getItem('json-beauty-config');
        if (configRaw) {
          var config = JSON.parse(configRaw);
          if (config.theme === 'dark' || config.theme === 'light' || config.theme === 'system') {
            preference = config.theme;
          }
        } else {
          var legacy = localStorage.getItem('theme');
          if (legacy === 'dark' || legacy === 'monokai') {
            preference = 'dark';
          }
        }
        var useDark =
          preference === 'dark' ||
          (preference === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (useDark) {
          document.body.classList.add('dark-theme');
        }
      } catch (e) {
        /* ignore */
      }
    })();
  </script>
