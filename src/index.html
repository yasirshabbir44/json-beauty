<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>JSON Beauty - JSON Formatter & Validator</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A powerful tool for formatting, validating, and manipulating JSON data">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JSON Beauty">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet">
</head>
<body>
  <script>
    (function () {
      try {
        var preference = 'light';
        var configRaw = localStorage.getItem('json-beauty-config');
        if (configRaw) {
          var config = JSON.parse(configRaw);
          if (config.theme === 'dark' || config.theme === 'light' || config.theme === 'system') {
            preference = config.theme;
          }
        } else {
          var legacy = localStorage.getItem('theme');
          if (legacy === 'dark' || legacy === 'monokai') {
            preference = 'dark';
          }
        }
        var useDark =
          preference === 'dark' ||
          (preference === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (useDark) {
          document.body.classList.add('dark-theme');
        }
      } catch (e) {
        /* ignore */
      }
    })();
  </script>
  <app-root></app-root>
</body>
</html>
