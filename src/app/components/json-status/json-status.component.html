<div *ngIf="isValidJson" class="status-section">
    <div class="status-item success">
        <mat-icon>check_circle</mat-icon>
        <span>JSON is valid</span>
    </div>
    <div class="status-item">
        <mat-icon>data_object</mat-icon>
        <span>{{ jsonSize }} characters</span>
    </div>
    <div *ngIf="selectedOutputFormat === 'json'" class="status-item">
        <mat-icon>{{ selectedViewMode === 'table' ? 'table_chart' : selectedViewMode === 'tree' ? 'account_tree' : 'article' }}</mat-icon>
        <span>{{ viewModeLabel }}</span>
    </div>
    <div *ngIf="selectedOutputFormat === 'yaml'" class="status-item">
        <mat-icon>description</mat-icon>
        <span>YAML Mode</span>
    </div>
</div>
