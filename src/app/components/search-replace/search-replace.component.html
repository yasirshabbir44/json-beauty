<div class="sr-backdrop" role="presentation">
  <section class="sr-panel" [formGroup]="searchForm" role="search" aria-label="Search and replace">
    <div class="sr-toolbar">
      <mat-icon class="sr-lead-icon" aria-hidden="true">find_replace</mat-icon>

      <mat-form-field appearance="outline" class="sr-field sr-field--search" subscriptSizing="dynamic">
        <mat-label>Search</mat-label>
        <input formControlName="searchPattern" matInput placeholder="Find in document…" />
        <button type="button" mat-icon-button matSuffix matTooltip="Search" (click)="search()">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>

      <div class="sr-nav">
        <button type="button" mat-icon-button matTooltip="Previous" [disabled]="searchResults.length === 0" (click)="findPrevious()">
          <mat-icon>keyboard_arrow_up</mat-icon>
        </button>
        <button type="button" mat-icon-button matTooltip="Next" [disabled]="searchResults.length === 0" (click)="findNext()">
          <mat-icon>keyboard_arrow_down</mat-icon>
        </button>
      </div>

      @if (searchResults.length > 0) {
        <span class="sr-match-badge">{{ currentResultIndex + 1 }} / {{ searchResults.length }}</span>
      }
    </div>

    <div class="sr-replace-row">
      <mat-form-field appearance="outline" class="sr-field sr-field--replace" subscriptSizing="dynamic">
        <mat-label>Replace</mat-label>
        <input formControlName="replacePattern" matInput placeholder="Replacement text" />
      </mat-form-field>

      <div class="sr-actions">
        <button type="button" mat-stroked-button color="primary" [disabled]="searchResults.length === 0" (click)="replace()">
          Replace
        </button>
        <button type="button" mat-stroked-button [disabled]="searchResults.length === 0" (click)="replaceAll()">
          Replace all
        </button>
      </div>
    </div>

    <div class="sr-footer">
      <mat-checkbox color="primary" formControlName="isRegex">Regex</mat-checkbox>
      <mat-checkbox color="primary" formControlName="isCaseSensitive">Match case</mat-checkbox>
      <mat-checkbox color="primary" formControlName="isWholeWord">Whole word</mat-checkbox>

      @if (totalReplacements > 0) {
        <span class="sr-replacement-stat">{{ totalReplacements }} replaced</span>
      }
    </div>
  </section>
</div>
