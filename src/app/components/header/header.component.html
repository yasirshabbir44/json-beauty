<div class="header-container">
    <div class="header-content flex items-center justify-between gap-4 w-full">
        <a
            routerLink="/"
            class="logo-container flex items-center gap-3 min-w-0"
            aria-label="Back to home"
            (click)="onLogoClick($event)">
            <div class="logo-animation" aria-hidden="true">
                <mat-icon class="logo-icon">data_object</mat-icon>
            </div>
            <div class="title-container">
                <p class="logo-text">{{ title }}</p>
                <p class="logo-subtitle">{{ subtitle }}</p>
            </div>
        </a>

        @if ((pwa.isOnline$ | async) === false) {
            <div
                class="offline-badge jb-badge hidden sm:inline-flex shrink-0"
                matTooltip="You are offline. Cached app features still work."
                matTooltipPosition="below"
                role="status"
                aria-live="polite">
                <mat-icon class="offline-badge-icon !w-4 !h-4 !text-base" aria-hidden="true">cloud_off</mat-icon>
                <span>Offline</span>
            </div>
        }
        <div
            class="trust-badge jb-badge jb-badge--accent hidden sm:inline-flex shrink-0"
            matTooltip="100% Secure: All processing happens entirely in your browser. Your data never leaves your machine."
            matTooltipPosition="below"
            aria-label="100% Secure: All processing happens entirely in your browser. Your data never leaves your machine.">
            <mat-icon class="trust-badge-icon !w-4 !h-4 !text-base" aria-hidden="true">verified_user</mat-icon>
            <span class="trust-badge-label">100% Client-Side</span>
        </div>

        <div class="header-actions flex items-center gap-1 shrink-0">
            <ng-content></ng-content>
        </div>
    </div>
</div>
