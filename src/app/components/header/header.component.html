<div class="header-container">
    <div class="header-content">
        <div class="logo-container">
            <div class="logo-animation" aria-hidden="true">
                <mat-icon class="logo-icon">data_object</mat-icon>
            </div>
            <div class="title-container">
                <h1 class="logo-text">{{ title }}</h1>
                <p class="logo-subtitle">{{ subtitle }}</p>
            </div>
        </div>

        <div
            class="trust-badge"
            matTooltip="100% Secure: All processing happens entirely in your browser. Your data never leaves your machine."
            matTooltipPosition="below"
            aria-label="100% Secure: All processing happens entirely in your browser. Your data never leaves your machine.">
            <mat-icon class="trust-badge-icon" aria-hidden="true">verified_user</mat-icon>
            <span class="trust-badge-label">100% Client-Side</span>
        </div>

        <div class="header-actions">
            <ng-content></ng-content>
        </div>
    </div>
</div>
