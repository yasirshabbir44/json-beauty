@if (pwa.showInstallBanner$ | async) {
    <aside class="pwa-banner" role="region" aria-label="Install app for offline use" aria-live="polite">
        <div class="pwa-banner__content">
            <mat-icon class="pwa-banner__icon" aria-hidden="true">offline_pin</mat-icon>
            <div class="pwa-banner__text">
                <p class="pwa-banner__title">Use JSON Beauty offline</p>
                <p class="pwa-banner__subtitle">
                    Install the app once — formatting and validation keep working without a connection.
                </p>
            </div>
            <div class="pwa-banner__actions">
                <button type="button" mat-flat-button color="primary" class="pwa-banner__install" (click)="onInstall()">
                    Install
                </button>
                <button
                    type="button"
                    mat-icon-button
                    class="pwa-banner__dismiss"
                    (click)="onDismiss()"
                    aria-label="Dismiss install prompt">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
        </div>
    </aside>
}
