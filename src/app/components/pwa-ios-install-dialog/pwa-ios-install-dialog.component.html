<h2 mat-dialog-title>Install for offline use</h2>
<mat-dialog-content>
    <p class="pwa-ios-dialog__lead">
        Add JSON Beauty to your home screen to use it without an internet connection.
    </p>
    <ol class="pwa-ios-dialog__steps">
        <li>
            Tap <mat-icon aria-hidden="true">ios_share</mat-icon>
            <strong>Share</strong> in Safari’s toolbar.
        </li>
        <li>
            Scroll and tap <strong>Add to Home Screen</strong>.
        </li>
        <li>
            Tap <strong>Add</strong>, then open JSON Beauty from your home screen.
        </li>
    </ol>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button type="button" mat-flat-button color="primary" (click)="close()">Got it</button>
</mat-dialog-actions>
