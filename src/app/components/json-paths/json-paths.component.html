<!-- JSON Paths Section -->
@if (showJsonPaths && isValidJson) {
  <div class="json-paths-section">
    <h3>
      <mat-icon>route</mat-icon>
      <span>JSON Paths</span>
      <div class="spacer"></div>
      <button (click)="closeJsonPaths()" class="close-btn" mat-icon-button>
        <mat-icon>close</mat-icon>
      </button>
    </h3>
    <div class="paths-container">
      <mat-chip-set>
        @for (path of jsonPaths; track path) {
          <mat-chip color="primary" selected>{{ path }}</mat-chip>
        }
      </mat-chip-set>
    </div>
  </div>
}
