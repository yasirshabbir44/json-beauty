<div id="jb-root" class="app-container min-h-screen flex flex-col bg-jb-app text-jb-text font-sans">
    <app-header [title]="title" subtitle="Format • Validate • Compare • Convert">
        <button
            type="button"
            mat-icon-button
            class="theme-toggle-btn"
            (click)="toggleTheme()"
            [attr.aria-pressed]="isDarkTheme"
            [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
            matTooltip="{{ isDarkTheme ? 'Light mode' : 'Dark mode' }}">
            <mat-icon>{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        <button [matMenuTriggerFor]="settingsMenu" [matTooltip]="'Settings and Options'"
                aria-label="Settings and Options" class="settings-btn"
                mat-icon-button>
            <mat-icon>settings</mat-icon>
        </button>
        <mat-menu #settingsMenu="matMenu">
            <button (click)="settings.toggleFormattingOptions()" mat-menu-item>
                <mat-icon>settings</mat-icon>
                <span>Options</span>
            </button>
            <button (click)="settings.toggleKeyboardShortcuts()" mat-menu-item>
                <mat-icon>keyboard</mat-icon>
                <span>Shortcuts</span>
            </button>
            <button (click)="settings.toggleSearchReplace()" mat-menu-item>
                <mat-icon>find_replace</mat-icon>
                <span>Search & Replace</span>
            </button>
            <mat-divider></mat-divider>
            <a mat-menu-item routerLink="/support">
                <mat-icon>volunteer_activism</mat-icon>
                <span>Support the project</span>
            </a>
        </mat-menu>
    </app-header>

    <div class="main-content" [class.main-content--landing]="isLandingRoute">
        <router-outlet></router-outlet>
    </div>

    <app-footer tagline="Format · Validate · Compare · Convert"></app-footer>
</div>
