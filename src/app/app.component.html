<div id="jb-root" class="app-container min-h-screen flex flex-col bg-jb-app text-jb-text font-sans">
    <app-header [title]="title" subtitle="Format • Validate • Compare • Convert">
        @if (pwa.showInstallButton$ | async) {
            <button
                type="button"
                mat-icon-button
                class="install-app-btn"
                [class.install-app-btn--ready]="pwa.canInstall$ | async"
                (click)="installApp()"
                matTooltip="Install app for offline use"
                aria-label="Install app for offline use">
                <mat-icon>install_mobile</mat-icon>
            </button>
        } @else {
            <button
                type="button"
                mat-icon-button
                class="install-app-btn install-app-btn--installed"
                disabled
                matTooltip="Installed — works offline"
                aria-label="App installed for offline use">
                <mat-icon>offline_pin</mat-icon>
            </button>
        }
        <button
            type="button"
            mat-icon-button
            class="theme-toggle-btn"
            (click)="toggleTheme()"
            [attr.aria-pressed]="isDarkTheme"
            [attr.aria-label]="isDarkTheme ? 'Switch to light mode' : 'Switch to dark mode'"
            matTooltip="{{ isDarkTheme ? 'Light mode' : 'Dark mode' }}">
            <mat-icon>{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        @if (isLandingRoute) {
            <a
                mat-icon-button
                class="support-header-btn"
                routerLink="/support"
                matTooltip="Support the project"
                aria-label="Support the project">
                <mat-icon>volunteer_activism</mat-icon>
            </a>
        } @else {
            <button [matMenuTriggerFor]="settingsMenu" [matTooltip]="'Settings and Options'"
                    aria-label="Settings and Options" class="settings-btn"
                    mat-icon-button>
                <mat-icon>settings</mat-icon>
            </button>
            <mat-menu #settingsMenu="matMenu">
                <button (click)="settings.toggleFormattingOptions()" mat-menu-item>
                    <mat-icon>settings</mat-icon>
                    <span>Options</span>
                </button>
                <button (click)="settings.toggleKeyboardShortcuts()" mat-menu-item>
                    <mat-icon>keyboard</mat-icon>
                    <span>Shortcuts</span>
                </button>
                <button (click)="settings.toggleSearchReplace()" mat-menu-item>
                    <mat-icon>find_replace</mat-icon>
                    <span>Search & Replace</span>
                </button>
                <mat-divider></mat-divider>
                <a mat-menu-item routerLink="/support">
                    <mat-icon>volunteer_activism</mat-icon>
                    <span>Support the project</span>
                </a>
            </mat-menu>
        }
    </app-header>

    <main id="main-content" class="main-content" [class.main-content--landing]="isLandingRoute">
        <router-outlet></router-outlet>
    </main>

    <app-footer tagline="Format · Validate · Compare · Convert"></app-footer>
</div>
